<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mil Modas - Sistema Completo</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff;display:flex}
/* SIDEBAR */
.sidebar{width:220px;background:#1a1a1a;padding:20px;height:100vh}
.sidebar button{width:100%;margin-bottom:10px;padding:8px;background:gold;border:none;cursor:pointer;font-weight:bold}
/* CONTEÚDO */
.content{flex:1;padding:20px;overflow:auto}
.card{background:#1e1e1e;padding:20px;border-radius:8px;margin-bottom:20px}
input,select{margin:5px 0;padding:6px;border:none;border-radius:5px;background:#222;color:#fff}
table{width:100%;margin-top:10px;border-collapse:collapse}
th,td{border:1px solid #333;padding:6px;text-align:center}
th{background:#222;color:gold}
button.action{background:gold;color:#000;font-weight:bold;border:none;padding:6px;cursor:pointer;border-radius:5px}
/* LOGIN */
#loginTela{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:1000}
.loginBox{background:#1e1e1e;padding:40px;border-radius:10px;text-align:center;border:3px solid gold}
.loginBox h2{color:gold;margin-bottom:20px;font-size:32px}
.loginBox input{width:200px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginTela">
<div class="loginBox">
<h2>🔥 MM 🔥</h2>
<input id="usuario" placeholder="Usuário"><br>
<input type="password" id="senha" placeholder="Senha"><br>
<button class="action" onclick="login()">Entrar</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<button onclick="mostrar('dashboard')">Dashboard</button>
<button onclick="mostrar('produtos')">Produtos</button>
<button onclick="mostrar('clientes')">Clientes</button>
<button onclick="mostrar('fiado')">Fiado</button>
<button onclick="mostrar('caixa')">PDV</button>
<button onclick="relatorio()">Relatório</button>
<button onclick="logout()">Sair</button>
</div>

<!-- CONTEÚDO -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard" class="card">
<h2>Dashboard</h2>
<p>Total Produtos: <b id="totalProdutos">0</b></p>
<p>Total Caixa: R$ <b id="totalCaixa">0.00</b></p>
<p>Total Fiado: R$ <b id="totalFiado">0.00</b></p>
<p>Status Caixa: <b id="statusCaixa">Fechado</b></p>
</div>

<!-- PRODUTOS -->
<div id="produtos" class="card" style="display:none">
<h2>Produtos</h2>
<input id="nomeProduto" placeholder="Nome">
<input id="precoProduto" type="number" placeholder="Preço">
<input id="estoqueProduto" type="number" placeholder="Estoque">
<button class="action" onclick="addProduto()">Salvar</button>
<table>
<thead><tr><th>ID</th><th>Nome</th><th>Preço</th><th>Estoque</th><th></th></tr></thead>
<tbody id="listaProdutos"></tbody>
</table>
</div>

<!-- CLIENTES -->
<div id="clientes" class="card" style="display:none">
<h2>Clientes</h2>
<input id="nomeCliente" placeholder="Nome">
<input id="telefoneCliente" placeholder="Telefone">
<button class="action" onclick="addCliente()">Cadastrar</button>
<table>
<thead><tr><th>Nome</th><th>Telefone</th><th>Dívida</th></tr></thead>
<tbody id="listaClientes"></tbody>
</table>
</div>

<!-- FIADO -->
<div id="fiado" class="card" style="display:none">
<h2>Fiado</h2>
<table>
<thead>
<tr><th>Cliente</th><th>Valor</th><th>Data</th><th>Ação</th></tr>
</thead>
<tbody id="listaFiado"></tbody>
</table>
</div>

<!-- PDV -->
<div id="caixa" class="card" style="display:none">
<h2>PDV</h2>
<button class="action" onclick="abrirCaixa()">Abrir Caixa</button>
<button class="action" onclick="fecharCaixa()">Fechar Caixa</button>
<p>Status: <b id="statusCaixaPDV">Fechado</b></p>

<input id="pesquisa" placeholder="Pesquisar Produto" onkeyup="pesquisar()">

<select id="formaPagamento" onchange="mostrarClienteFiado()">
<option value="">Pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
<option>Fiado</option>
</select>

<select id="clienteFiado" style="display:none">
<option value="">Selecione o Cliente</option>
</select>

<input id="valorRecebido" type="number" placeholder="Valor Recebido">

<table>
<tbody id="resultadoPesquisa"></tbody>
</table>

<h3>Carrinho</h3>
<table>
<thead><tr><th>Produto</th><th>Preço</th></tr></thead>
<tbody id="carrinhoLista"></tbody>
</table>

<p>Total: R$ <b id="totalVenda">0.00</b></p>
<button class="action" onclick="finalizarVenda()">Finalizar Venda</button>
</div>

</div>

<script>
// Banco de dados local
let db = JSON.parse(localStorage.getItem("mm_loja")) || {
usuarios:[{usuario:"admin",senha:"1234"}],
produtos:[],
clientes:[],
fiado:[],
vendas:[],
caixa:{aberto:false,total:0}
};
let carrinho=[];

// SALVAR E RENDER
function salvar(){localStorage.setItem("mm_loja",JSON.stringify(db)); render();}

// LOGIN
function login(){
let user=db.usuarios.find(u=>u.usuario===usuario.value && u.senha===senha.value);
if(!user) return alert("Login inválido");
loginTela.style.display="none";
render();
}
function logout(){location.reload();}

// MOSTRAR TELA
function mostrar(id){
document.querySelectorAll(".card").forEach(c=>c.style.display="none");
document.getElementById(id).style.display="block";
}

// RENDER
function render(){
totalProdutos.innerText=db.produtos.length;
totalCaixa.innerText=db.caixa.total.toFixed(2);
totalFiado.innerText=db.fiado.reduce((s,f)=>s+f.valor,0).toFixed(2);
statusCaixa.innerText=db.caixa.aberto?"Aberto":"Fechado";
statusCaixaPDV.innerText=db.caixa.aberto?"Aberto":"Fechado";

// Produtos
listaProdutos.innerHTML="";
db.produtos.forEach(p=>{
listaProdutos.innerHTML+=`<tr>
<td>${p.id}</td>
<td>${p.nome}</td>
<td>${p.preco.toFixed(2)}</td>
<td>${p.estoque}</td>
<td><button class="action" onclick="removerProduto(${p.id})">X</button></td>
</tr>`;
});

// Clientes
listaClientes.innerHTML="";
db.clientes.forEach(c=>{
let divida=db.fiado.filter(f=>f.cliente===c.nome).reduce((s,f)=>s+f.valor,0);
listaClientes.innerHTML+=`<tr>
<td>${c.nome}</td>
<td>${c.telefone}</td>
<td>R$ ${divida.toFixed(2)}</td>
</tr>`;
});

// FIADO
listaFiado.innerHTML="";
db.fiado.forEach((f,index)=>{
listaFiado.innerHTML+=`<tr>
<td>${f.cliente}</td>
<td>R$ ${f.valor.toFixed(2)}</td>
<td>${f.data}</td>
<td><button class="action" onclick="pagarFiado(${index})">Receber</button></td>
</tr>`;
});

// Select clientes PDV
clienteFiado.innerHTML='<option value="">Selecione o Cliente</option>';
db.clientes.forEach(c=>{
clienteFiado.innerHTML+=`<option value="${c.nome}">${c.nome}</option>`;
});
}

// PRODUTOS
function addProduto(){
if(!nomeProduto.value) return;
db.produtos.push({id:Date.now(),nome:nomeProduto.value,preco:Number(precoProduto.value),estoque:Number(estoqueProduto.value)});
nomeProduto.value="";precoProduto.value="";estoqueProduto.value="";
salvar();
}
function removerProduto(id){db.produtos=db.produtos.filter(p=>p.id!==id);salvar();}

// CLIENTES
function addCliente(){
if(!nomeCliente.value) return;
db.clientes.push({nome:nomeCliente.value,telefone:telefoneCliente.value});
nomeCliente.value="";telefoneCliente.value="";
salvar();
}

// PESQUISAR PRODUTO
function pesquisar(){
let termo=pesquisa.value.toLowerCase();
resultadoPesquisa.innerHTML="";
db.produtos.filter(p=>p.nome.toLowerCase().includes(termo)&&p.estoque>0)
.forEach(p=>{
resultadoPesquisa.innerHTML+=`<tr>
<td>${p.nome}</td>
<td>${p.preco.toFixed(2)}</td>
<td><button class="action" onclick="addCarrinho(${p.id})">+</button></td>
</tr>`;
});
}

// CARRINHO
function addCarrinho(id){let p=db.produtos.find(p=>p.id===id);carrinho.push(p);atualizarCarrinho();}
function atualizarCarrinho(){
carrinhoLista.innerHTML="";
let total=0;
carrinho.forEach(p=>{total+=p.preco;carrinhoLista.innerHTML+=`<tr><td>${p.nome}</td><td>${p.preco.toFixed(2)}</td></tr>`;});
totalVenda.innerText=total.toFixed(2);
}

// CAIXA
function abrirCaixa(){db.caixa.aberto=true;salvar();}
function fecharCaixa(){alert("Total do Caixa: R$ "+db.caixa.total.toFixed(2));db.caixa.aberto=false;db.caixa.total=0;salvar();}

// SELECT CLIENTE FIADO
function mostrarClienteFiado(){clienteFiado.style.display=formaPagamento.value==="Fiado"?"inline-block":"none";}

// FINALIZAR VENDA
function finalizarVenda(){
if(!db.caixa.aberto) return alert("Abra o caixa");
if(carrinho.length===0) return alert("Carrinho vazio");
if(!formaPagamento.value) return alert("Selecione pagamento");
let total=parseFloat(totalVenda.innerText);

if(formaPagamento.value==="Fiado"){
if(!clienteFiado.value) return alert("Selecione o cliente");
db.fiado.push({cliente:clienteFiado.value,valor:total,data:new Date().toLocaleDateString("pt-BR")});
}else{
let recebido=Number(valorRecebido.value);
if(recebido<total) return alert("Valor insuficiente");
db.caixa.total+=total;
}

// Diminuir estoque
carrinho.forEach(p=>{
let prod=db.produtos.find(x=>x.id===p.id);
prod.estoque-=1;
});

carrinho=[];valorRecebido.value="";clienteFiado.value="";formaPagamento.value="";
atualizarCarrinho();salvar();alert("Venda Finalizada");
}

// PAGAR FIADO
function pagarFiado(index){
let valorPago=Number(prompt("Valor recebido:"));
if(!valorPago || valorPago<=0) return alert("Valor inválido");
if(valorPago>db.fiado[index].valor) return alert("Valor maior que a dívida");
db.fiado[index].valor-=valorPago;
db.caixa.total+=valorPago;
if(db.fiado[index].valor===0) db.fiado.splice(index,1);
salvar();alert("Pagamento registrado!");
}

// RELATÓRIO
function relatorio(){alert("Total vendido: R$ "+db.caixa.total.toFixed(2));}

render();
</script>

</body>
</html>
